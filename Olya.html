<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #4a6fa5;
        }

        h1 {
            color: #2c3e50;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .year-label {
            font-size: 1.3rem;
            color: #4a6fa5;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .month-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: transform 0.3s;
        }

        .month-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
        }

        .month-title {
            background: #4a6fa5;
            color: white;
            text-align: center;
            padding: 14px;
            font-size: 1.4rem;
            font-weight: 600;
        }

        .calendar-table {
            width: 100%;
            border-collapse: collapse;
        }

        .calendar-table th {
            padding: 12px 4px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #2c5a7a;
            border-bottom: 1px solid #ddd;
        }

        .calendar-table td {
            text-align: center;
            padding: 10px 5px;
            font-size: 0.9rem;
            border-radius: 8px;
        }

        .weekend {
            background-color: #fff5ef;
            color: #c7362b;
            font-weight: 500;
        }

        .other-month {
            color: #bbb;
        }

        .p1 { background-color: #d9f0d9; font-weight: 600; }
        .p2 { background-color: #cae9ff; font-weight: 600; }
        .p3 { background-color: #ffe0cc; font-weight: 600; }
        .p4 { background-color: #ffe0f0; font-weight: 600; }

        .lesson {
            border: 2px solid #1e6bb8;
            font-weight: 700;
        }

        .both1 { background-color: #d9f0d9; border: 2px solid #1e6bb8; font-weight: 700; }
        .both2 { background-color: #cae9ff; border: 2px solid #1e6bb8; font-weight: 700; }
        .both3 { background-color: #ffe0cc; border: 2px solid #1e6bb8; font-weight: 700; }
        .both4 { background-color: #ffe0f0; border: 2px solid #1e6bb8; font-weight: 700; }

        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            padding: 20px;
            background: white;
            border-radius: 12px;
        }

        .legend span {
            display: inline-block;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            vertical-align: middle;
            margin-right: 8px;
        }

        .l-week { background: #fff5ef; border: 1px solid #c7362b; }
        .l-p1 { background: #d9f0d9; border: 1px solid #90EE90; }
        .l-p2 { background: #cae9ff; border: 1px solid #ADD8E6; }
        .l-p3 { background: #ffe0cc; border: 1px solid #FFDAB9; }
        .l-p4 { background: #ffe0f0; border: 1px solid #FFB6C1; }
        .l-lesson { background: white; border: 2px solid #1e6bb8; }

        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            color: #777;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>2026</h1>
        <div class="year-label">Olya's Calendar</div>
    </header>

    <div class="calendar-grid" id="calendarGrid"></div>

    <div class="legend">
        <div><span class="l-week"></span> Выходные</div>
        <div><span class="l-p1"></span> Пакет 28.01 – 24.02</div>
        <div><span class="l-p2"></span> Пакет 25.02 – 24.03</div>
        <div><span class="l-p3"></span> Пакет 08.04 – 05.05</div>
        <div><span class="l-p4"></span> Пакет 06.05 – 02.06</div>
        <div><span class="l-lesson"></span> Занятие Оли</div>
    </div>

    <footer>
        <p>Календарь создан с использованием HTML, CSS и JavaScript</p>
        <p>© 2026 Календарь с выделенными пакетами дней</p>
    </footer>
</div>

<script>
    const year = 2026;
    const months = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
    const weekDays = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];

    // ----- ПАКЕТЫ (20 рабочих дней) -----
    const pkg1 = [
        "2026-01-28","2026-01-29","2026-01-30",
        "2026-02-02","2026-02-03","2026-02-04","2026-02-05","2026-02-06",
        "2026-02-09","2026-02-10","2026-02-11","2026-02-12","2026-02-13",
        "2026-02-16","2026-02-17","2026-02-18","2026-02-19","2026-02-20",
        "2026-02-23","2026-02-24"
    ];

    const pkg2 = [
        "2026-02-25","2026-02-26","2026-02-27",
        "2026-03-02","2026-03-03","2026-03-04","2026-03-05","2026-03-06",
        "2026-03-09","2026-03-10","2026-03-11","2026-03-12","2026-03-13",
        "2026-03-16","2026-03-17","2026-03-18","2026-03-19","2026-03-20",
        "2026-03-23","2026-03-24"
    ];

    const pkg3 = [
        "2026-04-08","2026-04-09","2026-04-10",
        "2026-04-13","2026-04-14","2026-04-15","2026-04-16","2026-04-17",
        "2026-04-20","2026-04-21","2026-04-22","2026-04-23","2026-04-24",
        "2026-04-27","2026-04-28","2026-04-29","2026-04-30",
        "2026-05-04","2026-05-05","2026-05-06"
    ];

    // 4-й пакет: 6 мая – 2 июня (розовый)
    const pkg4 = [
        "2026-05-06","2026-05-07","2026-05-08",
        "2026-05-11","2026-05-12","2026-05-13","2026-05-14","2026-05-15",
        "2026-05-18","2026-05-19","2026-05-20","2026-05-21","2026-05-22",
        "2026-05-25","2026-05-26","2026-05-27","2026-05-28","2026-05-29",
        "2026-06-01","2026-06-02"
    ];

    // ----- ЗАНЯТИЯ (среда) -----
    const lessons = [
        "2026-01-28","2026-02-04","2026-02-11","2026-02-18",
        "2026-02-25","2026-03-04","2026-03-11","2026-03-18",
        "2026-04-08","2026-04-15","2026-04-22","2026-04-29",
        "2026-05-06","2026-05-13","2026-05-20","2026-05-27"
    ];

    function getDaysInMonth(y,m) { return new Date(y, m+1, 0).getDate(); }
    function getStartOffset(y,m) { const d = new Date(y,m,1).getDay(); return d === 0 ? 6 : d-1; }
    function formatDate(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

    function getCellClass(dateStr, y,m,d) {
        const in1 = pkg1.includes(dateStr);
        const in2 = pkg2.includes(dateStr);
        const in3 = pkg3.includes(dateStr);
        const in4 = pkg4.includes(dateStr);
        const isLesson = lessons.includes(dateStr);
        const isWeekend = (new Date(y,m,d).getDay() === 0 || new Date(y,m,d).getDay() === 6);

        if (in1 && isLesson) return "both1";
        if (in2 && isLesson) return "both2";
        if (in3 && isLesson) return "both3";
        if (in4 && isLesson) return "both4";
        if (in1) return "p1";
        if (in2) return "p2";
        if (in3) return "p3";
        if (in4) return "p4";
        if (isLesson) return "lesson";
        if (isWeekend) return "weekend";
        return "";
    }

    function render() {
        const container = document.getElementById("calendarGrid");
        container.innerHTML = "";

        for (let m = 0; m < 12; m++) {
            const daysInMonth = getDaysInMonth(year, m);
            const startOffset = getStartOffset(year, m);
            const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;

            let html = `<div class="month-card"><div class="month-title">${months[m]} ${year}</div>
                        <table class="calendar-table"><thead></tr>`;
            for (let w of weekDays) {
                const isW = (w === "Сб" || w === "Вс");
                html += `<th${isW ? ' style="color:#e74c3c;"' : ''}>${w}</th>`;
            }
            html += `</thead><tbody>`;

            let day = 1;
            for (let i = 0; i < totalCells; i++) {
                if (i % 7 === 0) html += "<tr>";
                if (i >= startOffset && day <= daysInMonth) {
                    const dateStr = formatDate(year, m, day);
                    const cls = getCellClass(dateStr, year, m, day);
                    html += `<td class="${cls}">${day}</td>`;
                    day++;
                } else {
                    let pm = m === 0 ? 11 : m-1;
                    let py = m === 0 ? year-1 : year;
                    let prevDays = getDaysInMonth(py, pm);
                    let prevDay = prevDays - (startOffset - i - 1);
                    html += `<td class="other-month">${prevDay}</td>`;
                }
                if (i % 7 === 6) html += "</tr>";
            }
            html += `</tbody></table></div>`;
            container.innerHTML += html;
        }
    }

    render();
</script>
</body>
</html>
