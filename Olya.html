<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #4a6fa5;
        }
        
        h1 {
            color: #2c3e50;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
        
        .year-label {
            font-size: 1.3rem;
            color: #4a6fa5;
            font-weight: 600;
            letter-spacing: 2px;
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .month-container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .month-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
        }
        
        .month-header {
            background-color: #4a6fa5;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.4rem;
            font-weight: 600;
        }
        
        .calendar {
            width: 100%;
            padding: 15px;
            border-collapse: collapse;
        }
        
        .calendar th {
            color: #4a6fa5;
            font-weight: 600;
            padding: 10px 5px;
            font-size: 0.9rem;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        
        .calendar td {
            text-align: center;
            padding: 10px 5px;
            font-size: 0.95rem;
            border-radius: 6px;
            transition: background-color 0.2s;
            position: relative;
            width: 40px;
            height: 40px;
        }
        
        .calendar td:hover {
            background-color: #f0f4ff;
        }
        
        .calendar td.weekend {
            color: #e74c3c;
            font-weight: 600;
            background-color: #FFF9F0;
        }
        
        .calendar td.package-20day-1 {
            background-color: rgba(144, 238, 144, 0.4);
            font-weight: 600;
            color: #2c3e50;
        }
        
        .calendar td.package-20day-2 {
            background-color: rgba(173, 216, 230, 0.5);
            font-weight: 600;
            color: #2c3e50;
        }
        
        .calendar td.package-20day-3 {
            background-color: rgba(255, 218, 185, 0.6);
            font-weight: 600;
            color: #2c3e50;
        }
        
        .calendar td.package-olya {
            font-weight: 700;
            color: #2c3e50;
            border: 2px solid #1e6bb8;
            background-color: white;
        }
        
        .calendar td.both-packages-1 {
            background-color: rgba(144, 238, 144, 0.4);
            font-weight: 700;
            color: #2c3e50;
            border: 2px solid #1e6bb8;
        }
        
        .calendar td.both-packages-2 {
            background-color: rgba(173, 216, 230, 0.5);
            font-weight: 700;
            color: #2c3e50;
            border: 2px solid #1e6bb8;
        }
        
        .calendar td.both-packages-3 {
            background-color: rgba(255, 218, 185, 0.6);
            font-weight: 700;
            color: #2c3e50;
            border: 2px solid #1e6bb8;
        }
        
        .calendar td.other-month {
            color: #ccc;
        }
        
        .legend {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        
        .legend-border {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 2px solid;
        }
        
        .weekend-color {
            background-color: #FFF9F0;
            border: 1px solid #e74c3c;
        }
        
        .package-20day-1-color {
            background-color: rgba(144, 238, 144, 0.4);
            border: 1px solid #90EE90;
        }
        
        .package-20day-2-color {
            background-color: rgba(173, 216, 230, 0.5);
            border: 1px solid #ADD8E6;
        }
        
        .package-20day-3-color {
            background-color: rgba(255, 218, 185, 0.6);
            border: 1px solid #FFDAB9;
        }
        
        .package-olya-color {
            background-color: white;
            border: 2px solid #1e6bb8;
        }
        
        .both-packages-1-color {
            background-color: rgba(144, 238, 144, 0.4);
            border: 2px solid #1e6bb8;
        }
        
        .both-packages-2-color {
            background-color: rgba(173, 216, 230, 0.5);
            border: 2px solid #1e6bb8;
        }
        
        .both-packages-3-color {
            background-color: rgba(255, 218, 185, 0.6);
            border: 2px solid #1e6bb8;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            color: #777;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>2026</h1>
            <div class="year-label">Olya's Calendar</div>
        </header>
        
        <main>
            <div class="calendar-grid" id="calendar-container"></div>
            
            <div class="legend">
                <div class="legend-item"><div class="legend-color weekend-color"></div><span>Выходные дни</span></div>
                <div class="legend-item"><div class="legend-color package-20day-1-color"></div><span>Пакет 20 дней (январь-февраль)</span></div>
                <div class="legend-item"><div class="legend-color package-20day-2-color"></div><span>Пакет 20 дней (февраль-март)</span></div>
                <div class="legend-item"><div class="legend-color package-20day-3-color"></div><span>Пакет 20 дней (апрель-май)</span></div>
                <div class="legend-item"><div class="legend-border package-olya-color"></div><span>Занятие Оли</span></div>
                <div class="legend-item"><div class="legend-border both-packages-1-color"></div><span>1-й пакет + Оля</span></div>
                <div class="legend-item"><div class="legend-border both-packages-2-color"></div><span>2-й пакет + Оля</span></div>
                <div class="legend-item"><div class="legend-border both-packages-3-color"></div><span>3-й пакет + Оля</span></div>
            </div>
        </main>
        
        <footer>
            <p>Календарь создан с использованием HTML, CSS и JavaScript</p>
            <p>© 2026 Календарь с выделенными пакетами дней</p>
        </footer>
    </div>

    <script>
        const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        const dayNames = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];
        const year = 2026;
        
        // ПЕРВЫЙ ПАКЕТ: 28 января - 24 февраля (светло-зеленый)
        const package20Days1 = [
            "2026-01-28", "2026-01-29", "2026-01-30",
            "2026-02-02", "2026-02-03", "2026-02-04", "2026-02-05", "2026-02-06",
            "2026-02-09", "2026-02-10", "2026-02-11", "2026-02-12", "2026-02-13",
            "2026-02-16", "2026-02-17", "2026-02-18", "2026-02-19", "2026-02-20",
            "2026-02-23", "2026-02-24"
        ];
        
        // ВТОРОЙ ПАКЕТ: 25 февраля - 24 марта (голубой)
        const package20Days2 = [
            "2026-02-25", "2026-02-26", "2026-02-27",
            "2026-03-02", "2026-03-03", "2026-03-04", "2026-03-05", "2026-03-06",
            "2026-03-09", "2026-03-10", "2026-03-11", "2026-03-12", "2026-03-13",
            "2026-03-16", "2026-03-17", "2026-03-18", "2026-03-19", "2026-03-20",
            "2026-03-23", "2026-03-24"
        ];
        
        // ТРЕТИЙ ПАКЕТ: 8 апреля - 5 мая (персиковый) - ИСПРАВЛЕН (добавлено 1 мая)
        const package20Days3 = [
            "2026-04-08", "2026-04-09", "2026-04-10",
            "2026-04-13", "2026-04-14", "2026-04-15", "2026-04-16", "2026-04-17",
            "2026-04-20", "2026-04-21", "2026-04-22", "2026-04-23", "2026-04-24",
            "2026-04-27", "2026-04-28", "2026-04-29", "2026-04-30",
            "2026-05-01", // 1 мая добавлен!
            "2026-05-04", "2026-05-05"
        ];
        
        // ЗАНЯТИЯ ОЛИ - СРЕДА (4 занятия в каждом пакете)
        const packageOlya = [
            // Первый пакет (январь-февраль) - 4 занятия
            "2026-01-28", "2026-02-04", "2026-02-11", "2026-02-18",
            
            // Второй пакет (февраль-март) - 4 занятия
            "2026-02-25", "2026-03-04", "2026-03-11", "2026-03-18",
            
            // Третий пакет (апрель-май) - 4 занятия (по средам)
            "2026-04-08", "2026-04-15", "2026-04-22", "2026-04-29"
        ];
        
        function getDaysInMonth(year, month) {
            return new Date(year, month + 1, 0).getDate();
        }
        
        function getFirstDayOfMonth(year, month) {
            const firstDay = new Date(year, month, 1).getDay();
            return firstDay === 0 ? 6 : firstDay - 1;
        }
        
        function formatDate(year, month, day) {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }
        
        function isInPackage20Days1(year, month, day) {
            return package20Days1.includes(formatDate(year, month, day));
        }
        
        function isInPackage20Days2(year, month, day) {
            return package20Days2.includes(formatDate(year, month, day));
        }
        
        function isInPackage20Days3(year, month, day) {
            return package20Days3.includes(formatDate(year, month, day));
        }
        
        function isInPackageOlya(year, month, day) {
            return packageOlya.includes(formatDate(year, month, day));
        }
        
        function createMonthCalendar(year, month) {
            const daysInMonth = getDaysInMonth(year, month);
            const firstDayIndex = getFirstDayOfMonth(year, month);
            
            let html = `<div class="month-container"><div class="month-header">${monthNames[month]} ${year}</div><table class="calendar"><thead>  <tr>`;
            
            for (let day of dayNames) {
                const isWeekend = day === "Сб" || day === "Вс";
                html += `<th${isWeekend ? ' style="color:#e74c3c;"' : ''}>${day}</th>`;
            }
            
            html += `</tr></thead><tbody>`;
            
            let dayCounter = 1;
            
            for (let week = 0; week < 6; week++) {
                html += "<tr>";
                
                for (let dayOfWeek = 0; dayOfWeek < 7; dayOfWeek++) {
                    if (week === 0 && dayOfWeek < firstDayIndex) {
                        const prevMonthDays = getDaysInMonth(year, month - 1);
                        const prevMonthDay = prevMonthDays - (firstDayIndex - dayOfWeek - 1);
                        html += `<td class="other-month">${prevMonthDay}</td>`;
                    } else if (dayCounter > daysInMonth) {
                        const nextMonthDay = dayCounter - daysInMonth;
                        html += `<td class="other-month">${nextMonthDay}</td>`;
                        dayCounter++;
                    } else {
                        const isWeekend = dayOfWeek === 5 || dayOfWeek === 6;
                        const in1 = isInPackage20Days1(year, month, dayCounter);
                        const in2 = isInPackage20Days2(year, month, dayCounter);
                        const in3 = isInPackage20Days3(year, month, dayCounter);
                        const inOlya = isInPackageOlya(year, month, dayCounter);
                        
                        let dayClass = isWeekend ? " weekend" : "";
                        
                        if (in1 && inOlya) dayClass += " both-packages-1";
                        else if (in2 && inOlya) dayClass += " both-packages-2";
                        else if (in3 && inOlya) dayClass += " both-packages-3";
                        else if (in1) dayClass += " package-20day-1";
                        else if (in2) dayClass += " package-20day-2";
                        else if (in3) dayClass += " package-20day-3";
                        else if (inOlya) dayClass += " package-olya";
                        
                        html += `<td class="${dayClass}">${dayCounter}</td>`;
                        dayCounter++;
                    }
                }
                
                html += "</tr>";
                if (dayCounter > daysInMonth) break;
            }
            
            html += `</tbody></table></div>`;
            return html;
        }
        
        function createYearCalendar() {
            const container = document.getElementById("calendar-container");
            for (let month = 0; month < 12; month++) {
                container.innerHTML += createMonthCalendar(year, month);
            }
        }
        
        document.addEventListener("DOMContentLoaded", createYearCalendar);
    </script>
</body>
</html>
